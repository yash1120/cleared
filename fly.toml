# Fly.io config for Cleared. Sydney region for AU data residency.
# Deploy:
#   fly launch --no-deploy --copy-config --name cleared-demo
#   fly volumes create cleared_data --region syd --size 1
#   fly secrets set CLEARED_SECRET_KEY=$(openssl rand -hex 32)
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...   # optional; omit for mock mode
#   fly deploy
app = "cleared-demo"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  CLEARED_ADMIN_EMAILS = "demo@cleared.com.au"
  CLEARED_DB_PATH = "/data/cleared.db"
  CLEARED_SEED_DEMO = "1"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      method = "GET"
      path = "/api/health"
      interval = "15s"
      timeout = "2s"
      grace_period = "10s"

[[mounts]]
  source = "cleared_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
